<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>🥤 JUGOS NAYI</title>
    <!-- PWA Icons -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Jugos Nayi" />
    <meta name="theme-color" content="#1D9E75" />
    <link rel="manifest" href="/manifest.json" />
    <script>
      (function () {
        try {
          var tema = localStorage.getItem('tema')
          var oscuro = false
          if (tema === 'oscuro') oscuro = true
          else if (tema === 'claro') oscuro = false
          else {
            var raw = localStorage.getItem('jugos-nayi-ui')
            if (raw) {
              var data = JSON.parse(raw)
              var st = data.state != null ? data.state : data
              oscuro = !!st.darkMode
            }
          }
          if (oscuro) document.documentElement.classList.add('dark')
          else document.documentElement.classList.remove('dark')

          var rawUi = localStorage.getItem('jugos-nayi-ui')
          if (!rawUi) return
          var dataUi = JSON.parse(rawUi)
          var st = dataUi.state != null ? dataUi.state : dataUi
          var fs = st.fontScale
          if (fs === 's') document.documentElement.style.fontSize = '15px'
          else if (fs === 'l') document.documentElement.style.fontSize = '18px'
          else document.documentElement.style.fontSize = '16px'
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        try {
          var tema = localStorage.getItem('tema')
          var oscuro = tema === 'oscuro'
          if (tema !== 'claro' && tema !== 'oscuro') {
            var raw = localStorage.getItem('jugos-nayi-ui')
            if (raw) {
              var data = JSON.parse(raw)
              var st = data.state != null ? data.state : data
              oscuro = !!st.darkMode
            }
          }
          var r = document.getElementById('root')
          if (r) {
            r.classList.remove('tema-claro', 'tema-oscuro')
            r.classList.add(oscuro ? 'tema-oscuro' : 'tema-claro')
          }
        } catch (e) {}
      })()
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
